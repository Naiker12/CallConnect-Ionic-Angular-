<ion-content class="modal-content">
  <div class="modal-container">
    <div class="header">
      <ion-icon name="arrow-back-outline" (click)="closeModal()" class="back-icon"></ion-icon>
      <h2 class="title">Verificar Correo</h2>
    </div>

    <div class="illustration">
      <img src="assets/verify-img.png" alt="verify-email" />
    </div>

    <p class="description">
      Por favor, revisa el correo que te enviamos al correo <strong>{{ emailMasked }}</strong>
    </p>

    <div class="code-inputs">
      <ion-input type="text" maxlength="1" class="code-box" *ngFor="let i of [0,1,2,3]"></ion-input>
    </div>

    <p class="resend-text">       
         ¿Aún no lo entiendes? <strong (click)="resendCode()" class="resend">Reenviar</strong>
    </p>

    <ion-button expand="block" class="verify-btn" (click)="verifyCode()">Verificar</ion-button>
  </div>
</ion-content>
