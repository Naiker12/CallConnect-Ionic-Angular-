<ion-content class="ion-padding login-content">
  <form [formGroup]="form" (ngSubmit)="onLogin()" class="login-container">

    <app-back-button></app-back-button>

    <div class="header-section">
      <h2 class="login-title">¡Bienvenido de nuevo!</h2>
      <p class="login-subtitle">Inicia sesión para continuar</p>
    </div>

    <div class="form-fields">
      <ion-item class="custom-input" lines="none">
        <ion-icon name="mail-outline" slot="start" class="input-icon"></ion-icon>
        <ion-input 
          formControlName="email" 
          type="email"
          placeholder="Correo electrónico"
          label="Correo electrónico"
          labelPlacement="floating">
        </ion-input>
        <ion-icon *ngIf="form.get('email')?.valid" name="checkmark-outline" slot="end" color="success"></ion-icon>
      </ion-item>

      <ion-item class="custom-input" lines="none">
        <ion-icon name="lock-closed-outline" slot="start" class="input-icon"></ion-icon>
        <ion-input 
          formControlName="password" 
          type="password" 
          placeholder="Contraseña"
          label="Contraseña"
          labelPlacement="floating">
        </ion-input>
        <ion-icon name="eye-off-outline" slot="end" class="password-toggle"></ion-icon>
      </ion-item>

      <a (click)="goToRecover()" class="forgot-password">¿Olvidaste tu contraseña?</a>
    </div>

    <ion-button expand="block" class="sign-in-button" type="submit" [disabled]="form.invalid">
      Iniciar sesión
    </ion-button>

    <div class="social-section">
      <div class="divider">
        <span class="divider-line"></span>
        <span class="divider-text">o continuar con</span>
        <span class="divider-line"></span>
      </div>
    
      <div class="social-buttons">
        <ion-button expand="block" fill="outline" class="google-button" shape="round">
          <ion-icon slot="start" name="logo-google" class="social-icon"></ion-icon>
          Google
        </ion-button>
        
        <ion-button expand="block" fill="outline" class="github-button" shape="round">
          <ion-icon slot="start" name="logo-github" class="social-icon"></ion-icon>
          GitHub
        </ion-button>
      </div>
    </div>

    <p class="register-text">
      ¿No tienes una cuenta?
      <a (click)="goToRegister()">Regístrate</a>
    </p>

  </form>
</ion-content>
