<ion-header>
  <ion-toolbar color="primary">
    <ion-title>Chat con {{ contactName }}</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <!-- Simulación de mensajes -->
  <div class="chat-container">
    <div class="message received">Hola, ¿cómo estás?</div>
    <div class="message sent">Bien, ¿y tú?</div>
  </div>

  <!-- Botones de acción -->
  <ion-footer class="ion-padding-top">
    <ion-button expand="full" color="success" (click)="startVoiceCall()">
      📞 Llamada de voz
    </ion-button>

    <ion-button expand="full" color="tertiary" (click)="startVideoCall()" class="ion-margin-top">
      🎥 Videollamada
    </ion-button>
  </ion-footer>
</ion-content>
